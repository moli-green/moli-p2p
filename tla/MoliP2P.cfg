\* SPECIFICATION definition
SPECIFICATION Spec

\* BOUNDED CONSTANTS (Crucial for preventing State Explosion)
\* Keep these numbers extremely small for the model checker.
\* 3 peers and 2 images are sufficient to find 99% of protocol logic errors
\* without causing an infinite state space.
CONSTANTS
    Peers = {"p1", "p2", "p3"}
    Images = {"i1", "i2"}
    MaxConnections = 10
    MaxMessages = 100

\* INVARIANTS to check at every state
INVARIANT TypeOK
INVARIANT Safety_ServerLimit

\* LIVENESS PROPERTIES
\* Warning: Checking liveness properties significantly increases verification time.
\* If TLC hangs, comment out this line and only check invariants first.
PROPERTY Liveness_EventualConsistency

\* STATE CONSTRAINTS
\* This is a hard-stop for the model checker. If the state depth or a specific
\* variable grows beyond this constraint, TLC will stop exploring that branch.
\* It is the ultimate safeguard against infinite loops.
CONSTRAINT MaxMessagesLimit

\* (Optional) If we want to define the constraint in the CFG itself:
\* We actually handle this in the TLA+ file via the `message_count` variable.
\* The TLA+ actions are gated by `message_count <= MaxMessages`.

CHECK_DEADLOCK FALSE
